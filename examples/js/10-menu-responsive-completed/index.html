<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Navbar Responsive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" media="screen and (max-width:768px)" href="responsive.css">
</head>

<body>
    <header class="header">
        <div class="container-logo">
            <img class="logo-desktop" src="logo.png" alt="company logo">
        </div>
        <button id="btn-menu" class="btn-menu" aria-label="Open menu">
            <img src="hamburger-menu.png" alt="hamburger menu">
        </button>
        <nav id="navbar" class="navbar">
            <div id="navbar-header" class="navbar-header">
                <img class="logo-mobile" src="logo.png" alt="company logo">
                <button id="btn-close" class="btn-close" aria-label="Close menu">
                    <img src="close-menu.png" alt="">
                </button>
            </div>
            <ul id="list-items" class="list-items">
                <li><a class="item" href="#">Home</a></li>
                <li><a class="item" href="#">Contact us</a></li>
                <li><a class="item" href="#">Products</a></li>
                <li><a class="item" href="#">About us</a></li>
            </ul>
        </nav>
    </header>
    <script src="app.js"></script>
</body>
</html>
