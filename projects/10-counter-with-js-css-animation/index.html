<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice JS 01</title>
    <link rel="shortcut icon" href="dark-favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="counter-container">
        <h2>Counter</h2>
        <p id="count">0</p>
        <div class="first-buttom">
            <button id="increment" class="increment" onclick="increaseCount()">+</button>
            <button onclick="resetCount()"> Reset </button>
            <button id="decrement" class="decrement" onclick="decreaseCount()"> - </button>
        </div>
        <div class="second-buttom">
             <button onclick="saveCount()"> Save </button>
            <button onclick="loadCount()" >Load</button>
        </div>
    </section>
    <section id="warning" class="container-warning">
        <h2>Warning!</h2>
        <span>Counter must be positive number, not negative</span>
    </section>


    <script src="app.js"></script>
</body>
</html>
