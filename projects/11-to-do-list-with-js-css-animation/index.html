<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Js 02</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="container-task">
        <h1>To do List</h1>
        <div class="content-input">
            <input id="input-text" type="text" placeholder="Add new Task">
            <button onclick="addTask()" >+</button>
        </div>
        <button onclick="clearAll()" class="btn-clear">Clear all</button>
        <section class="container-list">
            <ul id="list-task" class="list-task">
                
            </ul>
        </section>

       
    </section>
     <section id="container-warning" class="container-warning">
            <h2 class="warning-title">Warning</h2>
            <p>Input is empty, add information about of the task</p>
        </section>


    <script src="app.js"></script>
</body>

</html>
